services:
  namecoind:
    build: ./namecoin
    restart: unless-stopped
    volumes:
      - namecoin-data:/home/namecoin/.namecoin
    ports:
      - "8334:8334"     # P2P
    healthcheck:
      test: ["CMD", "namecoin-cli", "-rpcuser=username", "-rpcpassword=password", "getblockchaininfo"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  electrumx:
    build: ./electrumx
    restart: unless-stopped
    depends_on:
      namecoind:
        condition: service_healthy
    environment:
      - DAEMON_URL=http://username:password@namecoind:8336/
    volumes:
      - electrumx-data:/var/lib/electrumx
    ports:
      - "50001:50001"   # ElectrumX TCP

  mempool-web:
    image: mempool/frontend:latest
    restart: on-failure
    stop_grace_period: 1m
    command: "./wait-for mempool-db:3306 --timeout=720 -- nginx -g 'daemon off;'"
    environment:
      FRONTEND_HTTP_PORT: "8080"
      BACKEND_MAINNET_HTTP_HOST: "mempool-api"
    ports:
      - "8080:8080"
    depends_on:
      mempool-api:
        condition: service_healthy
      mempool-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ | grep -q '<html' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  mempool-api:
    image: mempool/backend:latest
    restart: on-failure
    stop_grace_period: 1m
    command: "./wait-for-it.sh mempool-db:3306 --timeout=720 --strict -- ./start.sh"
    environment:
      MEMPOOL_BACKEND: "none"
      CORE_RPC_HOST: "namecoind"
      CORE_RPC_PORT: "8336"
      CORE_RPC_USERNAME: "username"
      CORE_RPC_PASSWORD: "password"
      DATABASE_ENABLED: "true"
      DATABASE_HOST: "mempool-db"
      DATABASE_DATABASE: "mempool"
      DATABASE_USERNAME: "mempool"
      DATABASE_PASSWORD: "mempool"
      STATISTICS_ENABLED: "true"
    volumes:
      - mempool-cache:/backend/cache
    depends_on:
      namecoind:
        condition: service_healthy
      mempool-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8999/api/v1/backend-info | grep -q . || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mempool-db:
    image: mariadb:10.5.21
    restart: on-failure
    stop_grace_period: 1m
    environment:
      MYSQL_DATABASE: "mempool"
      MYSQL_USER: "mempool"
      MYSQL_PASSWORD: "mempool"
      MYSQL_ROOT_PASSWORD: "admin"
      MARIADB_AUTO_UPGRADE: "1"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "mempool", "-pmempool"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  namecoin-data:
  electrumx-data:
  mempool-cache:
  mariadb-data:
